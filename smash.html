<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title id="pageTitle">Keyboard Smash</title>
<meta name="description" id="metaDesc" content="">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }
  .smash-label {
    font-size: 9px;
    color: #383838;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }
  .smash-text {
    font-family: 'Courier New', monospace;
    font-size: clamp(28px, 5vw, 56px);
    color: #ff8844;
    word-break: break-all;
    line-height: 1.3;
    max-width: 800px;
    font-weight: bold;
    text-shadow: 0 0 30px rgba(255,100,50,0.3);
  }
  .score-line {
    margin-top: 24px;
    font-size: 18px;
    color: #999;
  }
  .score-line .pts {
    color: #ffcc00;
    font-weight: bold;
    font-size: 22px;
  }
  .position-line {
    margin-top: 12px;
    font-size: 16px;
    color: #aaa;
    font-style: italic;
    max-width: 500px;
  }
  .stats {
    margin-top: 16px;
    font-size: 13px;
    color: #555;
  }
  .play-btn {
    display: inline-block;
    margin-top: 40px;
    padding: 16px 40px;
    background: rgba(255,80,40,0.85);
    color: #fff;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 18px;
    letter-spacing: 1px;
    transition: background 0.2s, transform 0.1s;
  }
  .play-btn:hover { background: rgba(255,80,40,1); transform: scale(1.03); }
  .back-link {
    margin-top: 20px;
    font-size: 13px;
    color: #555;
  }
  .back-link a { color: #666; text-decoration: underline; }
  .back-link a:hover { color: #999; }
</style>
</head>
<body>

<div class="smash-label">Someone smashed out</div>
<h1 class="smash-text" id="smashText"></h1>
<div class="score-line">That keyboard smash is worth <span class="pts" id="scorePts"></span> points.</div>
<div class="position-line" id="positionLine"></div>
<div class="stats" id="statsLine"></div>
<a class="play-btn" href="index.html">Play The Keyboard Smash Game</a>
<div class="back-link"><a href="leaderboard.html">Back to leaderboard</a></div>

<script>
const params = new URLSearchParams(window.location.search);
const smash = params.get('s') || 'asdfghjkl';
const score = parseInt(params.get('score')) || 0;
const rank = parseInt(params.get('rank')) || 1;
const total = parseInt(params.get('total')) || 1;
const keys = parseInt(params.get('keys')) || smash.length;

document.getElementById('smashText').textContent = smash;
document.getElementById('scorePts').textContent = score;
document.getElementById('statsLine').textContent = `${keys} keys`;

let posLine;
if (total === 1) posLine = `#1 on today's leaderboard — the only one here. That won't last.`;
else if (rank === 1) posLine = `#1 on today's leaderboard. ${total - 1} other smash${total > 2 ? 'es' : ''} couldn't touch it.`;
else if (rank === 2) posLine = `#2 on today's leaderboard. One smash stands between you and the top.`;
else if (rank === 3) posLine = `#3 on today's leaderboard. Close enough to taste #1.`;
else if (rank <= Math.ceil(total * 0.1)) posLine = `#${rank} of ${total} on today's leaderboard. Top 10% — not bad at all.`;
else if (rank <= Math.ceil(total * 0.25)) posLine = `#${rank} of ${total} on today's leaderboard. Upper quarter. Your fingers have potential.`;
else if (rank <= Math.ceil(total * 0.5)) posLine = `#${rank} of ${total} on today's leaderboard. Middle of the pack. Smash harder.`;
else posLine = `#${rank} of ${total} on today's leaderboard. You can do better than that.`;

document.getElementById('positionLine').textContent = posLine;
document.getElementById('pageTitle').textContent = smash;
document.getElementById('metaDesc').setAttribute('content',
  `Someone smashed out ${smash}. That keyboard smash is worth ${score} points. ${posLine}`
);
// Track page view
navigator.sendBeacon('/api/view', JSON.stringify({ page: 'smash' }));
</script>
</body>
</html>
