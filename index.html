<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smash Your Keyboard - The Keyboard Smash Game</title>
<meta name="description" content="Smash your keyboard as hard as you can. Every key launches your character higher. Reach the top and explode. Daily leaderboard ranks the best keyboard smashes.">
<link rel="canonical" href="https://smashyourkeyboard.com/">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    overflow: hidden;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
  }
  canvas { display: block; }
  #ui {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
  #title {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,100,50,0.8);
    letter-spacing: 4px;
  }
  #subtitle {
    font-size: 14px;
    color: #888;
    margin-top: 6px;
  }
  @media (max-width: 600px) {
    #ui {
      top: auto;
      bottom: 8px;
      right: 8px;
      left: auto;
      transform: none;
      text-align: right;
    }
    #title {
      font-size: 12px;
      letter-spacing: 1px;
      opacity: 0.5;
    }
    #subtitle { display: none; }
  }
  #combo {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    color: #ffcc00;
    font-weight: bold;
    z-index: 10;
    pointer-events: none;
    text-shadow: 0 0 10px rgba(255,200,0,0.6);
  }
  #restart {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px;
    color: #fff;
    background: rgba(255,80,40,0.8);
    border: none;
    padding: 14px 36px;
    border-radius: 12px;
    cursor: pointer;
    z-index: 20;
    display: none;
    font-weight: bold;
    letter-spacing: 2px;
  }
  #restart:hover { background: rgba(255,80,40,1); }
</style>
</head>
<body>
<div id="ui">
  <div id="title">KEYBOARD SMASH</div>
  <div id="subtitle">SMASH YOUR KEYBOARD TO RISE</div>
</div>
<div id="combo"></div>
<button id="restart" onclick="reset(); document.getElementById('mobile-input').focus();">SMASH AGAIN</button>
<a id="leaderboard-link" href="leaderboard.html" style="
  position:fixed; top:50%; left:50%; transform:translate(-50%,60px);
  font-size:16px; color:#ffcc00; z-index:20; display:none;
  text-decoration:underline; cursor:pointer;
">View Today's Leaderboard</a>
<input id="mobile-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="
  position:fixed; top:0; left:0; width:100%; height:100%;
  opacity:0; z-index:5; font-size:16px; caret-color:transparent;
  border:none; outline:none; background:transparent;
">
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const comboEl = document.getElementById('combo');
const restartBtn = document.getElementById('restart');

// ── Audio (Web Audio API — no files needed) ──
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playKeyHit() {
  // Snappy percussive click that rises in pitch with combo
  const t = audioCtx.currentTime;
  const freq = 200 + Math.min(combo * 15, 600) + Math.random() * 80;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.5, t + 0.08);
  gain.gain.setValueAtTime(0.15, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.08);

  // Add a noise burst for that satisfying "thwack"
  const bufSize = audioCtx.sampleRate * 0.03;
  const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  const noise = audioCtx.createBufferSource();
  const noiseGain = audioCtx.createGain();
  noise.buffer = noiseBuf;
  noiseGain.gain.setValueAtTime(0.12, t);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
  noise.connect(noiseGain).connect(audioCtx.destination);
  noise.start(t);
}

function playExplosion() {
  const t = audioCtx.currentTime;

  // Deep boom — low sine sweep
  const boom = audioCtx.createOscillator();
  const boomGain = audioCtx.createGain();
  boom.type = 'sine';
  boom.frequency.setValueAtTime(120, t);
  boom.frequency.exponentialRampToValueAtTime(20, t + 1.5);
  boomGain.gain.setValueAtTime(0.6, t);
  boomGain.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
  boom.connect(boomGain).connect(audioCtx.destination);
  boom.start(t);
  boom.stop(t + 1.5);

  // Sub-bass rumble
  const sub = audioCtx.createOscillator();
  const subGain = audioCtx.createGain();
  sub.type = 'sine';
  sub.frequency.setValueAtTime(40, t);
  sub.frequency.exponentialRampToValueAtTime(15, t + 2);
  subGain.gain.setValueAtTime(0.5, t);
  subGain.gain.exponentialRampToValueAtTime(0.001, t + 2);
  sub.connect(subGain).connect(audioCtx.destination);
  sub.start(t);
  sub.stop(t + 2);

  // Crackle / noise burst
  const bufSize = audioCtx.sampleRate * 2;
  const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    const env = Math.exp(-i / (audioCtx.sampleRate * 0.4));
    data[i] = (Math.random() * 2 - 1) * env;
  }
  const noise = audioCtx.createBufferSource();
  const noiseGain = audioCtx.createGain();
  noise.buffer = noiseBuf;
  noiseGain.gain.setValueAtTime(0.4, t);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 2);
  noise.connect(noiseGain).connect(audioCtx.destination);
  noise.start(t);

  // High crackle layer
  const crackle = audioCtx.createOscillator();
  const crackleGain = audioCtx.createGain();
  crackle.type = 'sawtooth';
  crackle.frequency.setValueAtTime(800, t);
  crackle.frequency.exponentialRampToValueAtTime(100, t + 0.5);
  crackleGain.gain.setValueAtTime(0.2, t);
  crackleGain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  crackle.connect(crackleGain).connect(audioCtx.destination);
  crackle.start(t);
  crackle.stop(t + 0.5);

  // Delayed secondary boom for that "double thump" feel
  const boom2 = audioCtx.createOscillator();
  const boom2Gain = audioCtx.createGain();
  boom2.type = 'sine';
  boom2.frequency.setValueAtTime(80, t + 0.15);
  boom2.frequency.exponentialRampToValueAtTime(18, t + 1.2);
  boom2Gain.gain.setValueAtTime(0.001, t);
  boom2Gain.gain.linearRampToValueAtTime(0.4, t + 0.15);
  boom2Gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
  boom2.connect(boom2Gain).connect(audioCtx.destination);
  boom2.start(t);
  boom2.stop(t + 1.2);
}

function playBoingo() {
  const t = audioCtx.currentTime;
  // Silly springy boing
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  const baseFreq = 300 + Math.random() * 400;
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 3, t + 0.05);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, t + 0.15);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 2, t + 0.2);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.3, t + 0.35);
  gain.gain.setValueAtTime(0.25, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.35);

  // Add a wobbly overtone
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(baseFreq * 1.5, t);
  osc2.frequency.exponentialRampToValueAtTime(baseFreq * 4, t + 0.08);
  osc2.frequency.exponentialRampToValueAtTime(baseFreq * 0.8, t + 0.25);
  gain2.gain.setValueAtTime(0.12, t);
  gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  osc2.connect(gain2).connect(audioCtx.destination);
  osc2.start(t); osc2.stop(t + 0.25);
}

function isEmoji(str) {
  const emojiRegex = /\p{Emoji_Presentation}|\p{Extended_Pictographic}/u;
  return emojiRegex.test(str);
}

function playRisingTone() {
  // Subtle rising whine as character gets higher — plays periodically
  const t = audioCtx.currentTime;
  const progress = 1 - (charY - 80) / (H - 200);
  if (progress < 0.3) return; // only when getting close

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(300 + progress * 1200, t);
  gain.gain.setValueAtTime(progress * 0.06, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.1);
}

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  // Use visualViewport height if available (shrinks when mobile keyboard opens)
  if (window.visualViewport) {
    H = canvas.height = window.visualViewport.height;
    canvas.style.height = H + 'px';
  } else {
    H = canvas.height = window.innerHeight;
  }
}
resize();
window.addEventListener('resize', resize);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', resize);
}

// Mobile detection
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.innerWidth < 600;
const charScale = isMobile ? 0.6 : 1;

// Game state
let charY, velocity, combo, comboTimer, keys, exploded, explosionTime;
let particles = [];
let shakeAmount = 0;
let stars = [];
let keyPops = [];
let smashLog = ''; // the actual key sequence

function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.5,
      a: Math.random() * 0.6 + 0.4
    });
  }
}

function reset() {
  charY = isMobile ? H - 20 : H - 120;
  velocity = 0;
  combo = 0;
  comboTimer = 0;
  keys = 0;
  smashLog = '';
  exploded = false;
  explosionTime = 0;
  particles = [];
  shakeAmount = 0;
  keyPops = [];
  restartBtn.style.display = 'none';
  document.getElementById('leaderboard-link').style.display = 'none';
  initStars();
}

function saveToLeaderboard() {
  const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
  const storageKey = 'kbsmash_leaderboard';
  const all = JSON.parse(localStorage.getItem(storageKey) || '{}');
  if (!all[today]) all[today] = [];

  // Calculate score: keys + combo bonus
  const maxCombo = combo;
  const score = keys * 10 + maxCombo * 5;

  all[today].push({
    smash: smashLog,
    score: score,
    keys: keys,
    time: new Date().toISOString(),
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6)
  });

  // Sort descending by score
  all[today].sort((a, b) => b.score - a.score);

  // Cap at 200 per day
  if (all[today].length > 200) all[today] = all[today].slice(0, 200);

  // Clean up old days (keep last 7)
  const dates = Object.keys(all).sort().reverse();
  dates.slice(7).forEach(d => delete all[d]);

  localStorage.setItem(storageKey, JSON.stringify(all));
}

reset();

// Character (little astronaut-like dude)
function drawCharacter(x, y, scale) {
  const s = scale || 1;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);

  // Flame trail
  if (!exploded) {
    const flameSize = Math.min(combo * 2 + 8, 50);
    const grad = ctx.createRadialGradient(0, 25, 2, 0, 25 + flameSize/2, flameSize);
    grad.addColorStop(0, 'rgba(255,200,50,0.9)');
    grad.addColorStop(0.4, 'rgba(255,100,20,0.6)');
    grad.addColorStop(1, 'rgba(255,30,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 25 + flameSize/3, 8 + Math.random()*3, flameSize/2 + Math.random()*5, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // Body
  ctx.fillStyle = '#e0e0e0';
  ctx.beginPath();
  ctx.roundRect(-12, -5, 24, 30, 6);
  ctx.fill();

  // Helmet
  ctx.fillStyle = '#4488ff';
  ctx.beginPath();
  ctx.arc(0, -12, 14, 0, Math.PI*2);
  ctx.fill();

  // Visor
  ctx.fillStyle = '#1a1a3a';
  ctx.beginPath();
  ctx.arc(0, -10, 9, 0, Math.PI*2);
  ctx.fill();

  // Visor shine
  ctx.fillStyle = 'rgba(150,200,255,0.4)';
  ctx.beginPath();
  ctx.arc(-3, -13, 4, 0, Math.PI*2);
  ctx.fill();

  // Legs
  ctx.fillStyle = '#bbb';
  ctx.fillRect(-10, 25, 7, 10);
  ctx.fillRect(3, 25, 7, 10);

  // Arms waving based on velocity
  const armWave = Math.sin(Date.now() / 80) * (Math.abs(velocity) * 0.3 + 5);
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-12, 5);
  ctx.lineTo(-22, 0 + armWave);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(12, 5);
  ctx.lineTo(22, 0 - armWave);
  ctx.stroke();

  ctx.restore();
}

// Explosion
function explode() {
  exploded = true;
  explosionTime = Date.now();
  shakeAmount = 40;
  playExplosion();
  saveToLeaderboard();

  // Massive particle burst
  for (let i = 0; i < 300; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 15 + 2;
    const hue = Math.random() * 60 + 10; // orange-yellow range
    particles.push({
      x: W/2,
      y: 80,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.015 + 0.005,
      size: Math.random() * 8 + 2,
      color: `hsl(${hue}, 100%, ${Math.random()*30+50}%)`
    });
  }

  // Ring particles
  for (let i = 0; i < 80; i++) {
    const angle = (i / 80) * Math.PI * 2;
    const speed = Math.random() * 4 + 8;
    particles.push({
      x: W/2,
      y: 80,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.008,
      size: Math.random() * 4 + 3,
      color: '#fff'
    });
  }

  // Sparks
  for (let i = 0; i < 100; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 20 + 5;
    particles.push({
      x: W/2,
      y: 80,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      life: 1,
      decay: Math.random() * 0.02 + 0.01,
      size: Math.random() * 2 + 1,
      color: `hsl(${Math.random()*40+30}, 100%, 80%)`,
      spark: true
    });
  }
}

// Key pop text
function addKeyPop(key) {
  keyPops.push({
    x: Math.random() * (W - 100) + 50,
    y: H - Math.random() * 100 - 50,
    char: key.toUpperCase(),
    life: 1,
    vy: -2 - Math.random() * 2,
    size: Math.random() * 20 + 16
  });
}

// Input — shared handler for desktop and mobile
const mobileInput = document.getElementById('mobile-input');

function handleSmashKey(char) {
  if (exploded) return;
  audioCtx.resume();

  keys++;
  combo++;
  comboTimer = 60;

  if (char) smashLog += char;

  if (isEmoji(char)) {
    playBoingo();
  } else {
    playKeyHit();
  }
  playRisingTone();

  const boost = -3.2 - Math.min(combo * 0.15, 2.5);
  velocity += boost;

  shakeAmount = Math.max(shakeAmount, 2 + combo * 0.3);

  for (let i = 0; i < 3; i++) {
    particles.push({
      x: W/2 + (Math.random()-0.5)*20,
      y: charY + 30,
      vx: (Math.random()-0.5)*4,
      vy: Math.random()*3 + 1,
      life: 1,
      decay: 0.03,
      size: Math.random()*4+2,
      color: `hsl(${30+Math.random()*30}, 100%, 60%)`
    });
  }

  addKeyPop(char || 'x');
}

// Desktop keyboard
document.addEventListener('keydown', (e) => {
  if (exploded) return;
  e.preventDefault();
  handleSmashKey(e.key);
});

// Mobile input — track what's typed via input events
mobileInput.addEventListener('input', (e) => {
  const data = e.data;
  if (!data) return;
  // Each character typed fires separately
  for (const char of data) {
    handleSmashKey(char);
  }
  // Clear the input so it keeps working
  mobileInput.value = '';
});

// Auto-focus the input on mobile to bring up keyboard
// Also unlock audio on first touch (iOS requires this from a direct user gesture)
function focusMobileInput() {
  mobileInput.focus();
  audioCtx.resume();
  // Play a silent buffer to fully unlock audio on iOS
  const buf = audioCtx.createBuffer(1, 1, 22050);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.start(0);
}
document.addEventListener('touchstart', focusMobileInput);
document.addEventListener('touchend', focusMobileInput);
mobileInput.focus();

// Main loop
function update() {
  // Gravity
  if (!exploded) {
    velocity += 0.6;
    charY += velocity;

    // Floor
    const floor = isMobile ? H - 20 : H - 120;
    if (charY > floor) {
      charY = floor;
      velocity = 0;
    }

    // Ceiling = explosion
    if (charY < 80) {
      charY = 80;
      explode();
    }

    // Combo decay
    if (comboTimer > 0) {
      comboTimer--;
    } else {
      combo = Math.max(0, combo - 1);
    }
  }

  // Shake decay
  shakeAmount *= 0.92;
  if (shakeAmount < 0.1) shakeAmount = 0;

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (!p.spark) p.vy += 0.1;
    else p.vy += 0.15;
    p.life -= p.decay;
    return p.life > 0;
  });

  // Key pops
  keyPops = keyPops.filter(k => {
    k.y += k.vy;
    k.life -= 0.02;
    return k.life > 0;
  });

  // Show restart after explosion settles
  if (exploded && Date.now() - explosionTime > 2500) {
    restartBtn.style.display = 'block';
    document.getElementById('leaderboard-link').style.display = 'block';
  }
}

function draw() {
  ctx.save();

  // Screen shake
  if (shakeAmount > 0.5) {
    ctx.translate(
      (Math.random()-0.5) * shakeAmount,
      (Math.random()-0.5) * shakeAmount
    );
  }

  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a2e');
  grad.addColorStop(1, '#1a0a10');
  ctx.fillStyle = grad;
  ctx.fillRect(-50, -50, W+100, H+100);

  // Stars
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${s.a * (0.5 + Math.sin(Date.now()/1000 + s.x)*0.5)})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  });

  // Progress bar (left side)
  const progress = 1 - (charY - 80) / (H - 200);
  const barH = H - 100;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(20, 50, 8, barH);
  const barGrad = ctx.createLinearGradient(0, 50 + barH, 0, 50);
  barGrad.addColorStop(0, '#ff4400');
  barGrad.addColorStop(0.5, '#ffaa00');
  barGrad.addColorStop(1, '#ffff00');
  ctx.fillStyle = barGrad;
  ctx.fillRect(20, 50 + barH * (1 - progress), 8, barH * progress);

  // Target zone at top
  if (!exploded) {
    const pulse = Math.sin(Date.now() / 300) * 0.3 + 0.7;
    ctx.strokeStyle = `rgba(255,200,50,${pulse * 0.4})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    ctx.moveTo(0, 80);
    ctx.lineTo(W, 80);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = `rgba(255,200,50,${pulse * 0.5})`;
    ctx.font = '12px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('EXPLOSION ZONE', W - 20, 75);
  }

  // Explosion flash
  if (exploded) {
    const elapsed = Date.now() - explosionTime;
    if (elapsed < 300) {
      const flashAlpha = 1 - elapsed / 300;
      ctx.fillStyle = `rgba(255,240,200,${flashAlpha * 0.8})`;
      ctx.fillRect(-50, -50, W+100, H+100);
    }

    // Expanding ring
    if (elapsed < 1500) {
      const ringR = elapsed * 0.5;
      const ringAlpha = 1 - elapsed / 1500;
      ctx.strokeStyle = `rgba(255,150,50,${ringAlpha})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(W/2, 80, ringR, 0, Math.PI*2);
      ctx.stroke();

      // Second ring
      if (elapsed > 100) {
        const r2 = (elapsed - 100) * 0.4;
        ctx.strokeStyle = `rgba(255,200,100,${ringAlpha * 0.6})`;
        ctx.beginPath();
        ctx.arc(W/2, 80, r2, 0, Math.PI*2);
        ctx.stroke();
      }
    }

    // Victory text
    if (elapsed > 500 && elapsed < 3000) {
      const textAlpha = Math.min(1, (elapsed - 500) / 500);
      const scale = 1 + Math.sin(elapsed / 200) * 0.05;
      ctx.save();
      ctx.translate(W/2, H/2 - 40);
      ctx.scale(scale, scale);
      ctx.fillStyle = `rgba(255,220,100,${textAlpha})`;
      ctx.font = 'bold 64px sans-serif';
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(255,100,0,0.8)';
      ctx.shadowBlur = 30;
      ctx.fillText('BOOM!', 0, 0);
      ctx.shadowBlur = 0;
      ctx.fillStyle = `rgba(255,255,255,${textAlpha * 0.8})`;
      ctx.font = '20px sans-serif';
      ctx.fillText(`${keys} keys smashed`, 0, 40);
      ctx.restore();
    }
  }

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    if (p.spark) {
      ctx.fillRect(p.x, p.y, p.size, p.size);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;

  // Key pop characters
  keyPops.forEach(k => {
    ctx.globalAlpha = k.life;
    ctx.fillStyle = `hsl(${Math.random()*40+20}, 100%, 70%)`;
    ctx.font = `bold ${k.size}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(k.char, k.x, k.y);
  });
  ctx.globalAlpha = 1;

  // Character
  if (!exploded) {
    drawCharacter(W/2, charY, charScale);
  }

  // Combo display
  if (combo > 3 && !exploded) {
    comboEl.textContent = `COMBO x${combo}`;
    comboEl.style.fontSize = `${Math.min(20 + combo, 48)}px`;
  } else {
    comboEl.textContent = '';
  }

  ctx.restore();
  requestAnimationFrame(loop);
}

function loop() {
  update();
  draw();
}
loop();
</script>
</body>
</html>
